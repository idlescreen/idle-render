name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout idle engine (path deps)
        uses: actions/checkout@v4
        with:
          repository: idlescreen/idle
          path: idle
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libwayland-dev libxkbcommon-dev libssl-dev pkg-config ffmpeg
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: dry-run binary
        run: cargo run -- --effect beams --duration 1s --dry-run -o /tmp/out.mkv
