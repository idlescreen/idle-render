name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout idle engine (path deps)
        uses: actions/checkout@v4
        with:
          repository: idlescreen/idle
          path: idle
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup component add rustfmt clippy
          rustc --version
          cargo --version
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libwayland-dev libxkbcommon-dev libssl-dev pkg-config ffmpeg
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: dry-run binary
        run: cargo run --bin render -- --effect beams --duration 1s --dry-run -o /tmp/out.mkv
